name: CarenceScan
options:
  bundleIdPrefix: com.carencescan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    MARKETING_VERSION: "1.8.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution

targets:
  CarenceScan:
    type: application
    platform: iOS
    configFiles:
    sources:
      - path: CarenceScan
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carencescan.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CarenceScan/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  CarenceScanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CarenceScanTests
    dependencies:
      - target: CarenceScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carencescan.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CarenceScan.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CarenceScan"

schemes:
  CarenceScan:
    build:
      targets:
        CarenceScan: all
        CarenceScanTests: [test]
    run:
      config: Debug
    test:
      targets:
        - CarenceScanTests
