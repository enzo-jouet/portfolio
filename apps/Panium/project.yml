name: Panium
options:
  bundleIdPrefix: com.prple
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution

targets:
  Panium:
    type: application
    platform: iOS
    configFiles:
    sources:
      - path: Panium
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prple.panium
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Panium/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  PaniumTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PaniumTests
    dependencies:
      - target: Panium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prple.panium.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Panium.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Panium"

schemes:
  Panium:
    build:
      targets:
        Panium: all
        PaniumTests: [test]
    run:
      config: Debug
    test:
      targets:
        - PaniumTests
