# GÃ©nÃ©ration du projet Xcode : brew install xcodegen && xcodegen
name: TrajOc
options:
  bundleIdPrefix: com.trajoc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution
targets:
  TrajOc:
    type: application
    platform: iOS
    configFiles:
    sources:
      - path: TrajOc
        excludes:
          - "**/APIKeys.example.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trajoc.app
        INFOPLIST_FILE: TrajOc/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrajOc/TrajOc.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: TrajOcWidgetExtension
        embed: true
  TrajOcWidgetExtension:
    type: app-extension
    platform: iOS
    configFiles:
    sources:
      - TrajOcWidget
      - path: TrajOc/Helpers/WidgetBridge.swift
      - path: TrajOc/Config/AppConstants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trajoc.app.widget
        CODE_SIGN_ENTITLEMENTS: TrajOcWidget/TrajOcWidget.entitlements
    info:
      path: TrajOcWidget/Info.plist
      properties:
        CFBundleDisplayName: TrajOc Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  TrajOcTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TrajOcTests
    dependencies:
      - target: TrajOc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trajoc.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TrajOc.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TrajOc"

schemes:
  TrajOc:
    build:
      targets:
        TrajOc: all
        TrajOcTests: [test]
    run:
      config: Debug
    test:
      targets:
        - TrajOcTests
