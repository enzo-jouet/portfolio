name: BeatDeal
options:
  bundleIdPrefix: com.cashthetrain
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution

targets:
  BeatDeal:
    type: application
    platform: iOS
    configFiles:
    sources:
      - path: BeatDeal
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cashthetrain.beatdeal
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BeatDeal/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  BeatDealTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BeatDealTests
    dependencies:
      - target: BeatDeal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cashthetrain.beatdeal.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BeatDeal.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BeatDeal"

schemes:
  BeatDeal:
    build:
      targets:
        BeatDeal: all
        BeatDealTests: [test]
    run:
      config: Debug
    test:
      targets:
        - BeatDealTests
