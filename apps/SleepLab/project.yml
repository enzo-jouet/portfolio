# GÃ©nÃ©ration du projet Xcode : brew install xcodegen && xcodegen
name: SleepLab
options:
  bundleIdPrefix: com.prple
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution
targets:
  SleepLab:
    type: application
    platform: iOS
    configFiles:
    sources:
      - path: SleepLab
        excludes:
          - "**/Sounds/README.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prple.sleeplab
        INFOPLIST_FILE: SleepLab/Info.plist
        CODE_SIGN_ENTITLEMENTS: SleepLab/SleepLab.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SleepLabWidgetExtension
        embed: true
  SleepLabWidgetExtension:
    type: app-extension
    platform: iOS
    configFiles:
    sources:
      - SleepLabWidget
      - path: SleepLab/Activity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prple.sleeplab.widget
        CODE_SIGN_ENTITLEMENTS: SleepLabWidget/SleepLabWidget.entitlements
    info:
      path: SleepLabWidget/Info.plist
      properties:
        CFBundleDisplayName: Noctavia Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  SleepLab:
    build:
      targets:
        SleepLab: all
    run:
      config: Debug
